name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json
      - name: Install server dependencies
        run: npm ci
        working-directory: server
      - name: Install client dependencies
        run: npm ci
        working-directory: client
      - name: Server lint
        run: npm run lint
        working-directory: server
      - name: Server typecheck
        run: npx tsc --noEmit
        working-directory: server
      - name: Client typecheck
        run: npx tsc --noEmit
        working-directory: client

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ""
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MYSQL_DATABASE: pwc_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: server
      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: server
      - name: Run migrations
        run: npx prisma migrate deploy
        working-directory: server
        env:
          DATABASE_URL: mysql://root@localhost:3306/pwc_test
      - name: Seed database
        run: npx prisma db seed
        working-directory: server
        env:
          DATABASE_URL: mysql://root@localhost:3306/pwc_test
          NODE_ENV: test
      - name: Run tests with coverage
        run: npm test -- --coverage
        working-directory: server
        env:
          NODE_ENV: test
          DATABASE_URL: mysql://root@localhost:3306/pwc_test
          JWT_SECRET: test-access-secret-key-for-ci-only-32ch
          JWT_REFRESH_SECRET: test-refresh-secret-key-for-ci-only-32ch

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: client/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: client
      - name: Run tests
        run: npx vitest run --coverage
        working-directory: client

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, backend-tests, frontend-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json
      - name: Install server deps
        run: npm ci
        working-directory: server
      - name: Install client deps
        run: npm ci
        working-directory: client
      - name: Build server
        run: npm run build
        working-directory: server
      - name: Build client
        run: npx vite build
        working-directory: client

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Audit server
        run: npm audit --audit-level=high
        working-directory: server
        continue-on-error: true
      - name: Audit client
        run: npm audit --audit-level=high
        working-directory: client
        continue-on-error: true
